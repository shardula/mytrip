<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyTrip">
<meta name="theme-color" content="#0e1117">
<title>Greece &amp; Egypt 2026</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1117;--bg2:#151820;--bg3:#1c2030;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#e8e2d4;--muted:#7a7264;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.15);--gold-border:rgba(201,168,76,0.35);--aegean:#2a6596;--aegean-dim:rgba(42,101,150,0.18);--terra:#b85c38;--green:#4caf7d;--red:#e05252;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;}
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-t) + 10px) 16px 10px;border-bottom:1px solid var(--border);background:var(--bg);z-index:50;}
.hdr-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
.hdr-actions{display:flex;gap:7px;align-items:center;}
.gps-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;}
.gps-pill.on{border-color:var(--green);color:var(--green);background:rgba(76,175,125,0.1);}
.gps-pill.err{border-color:var(--red);color:var(--red);}
.gps-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.gps-pill.on .gps-dot{animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.today-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--gold-border);background:var(--gold-dim);color:var(--gold);font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;cursor:pointer;}
.strip-wrap{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 0;}
.strip{display:flex;gap:6px;padding:0 14px;overflow-x:auto;scrollbar-width:none;}
.strip::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;width:46px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.02);position:relative;transition:all 0.15s;}
.chip.gr{border-color:rgba(42,101,150,0.4);}.chip.eg{border-color:rgba(201,168,76,0.4);}.chip.tr{border-color:rgba(255,255,255,0.11);}
.chip.active{background:var(--gold);border-color:var(--gold);}
.chip.active .cn{color:#0e1117;}.chip.active .cf{opacity:1;}
.cn{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);line-height:1;}
.cf{font-size:11px;margin-top:2px;opacity:0.75;}
.chip-dot{position:absolute;bottom:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--green);display:none;}
.chip.has-file .chip-dot{display:block;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-b) + 72px);}
.view{display:none;}.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp 0.25s ease;}
.hero{padding:18px 16px 14px;position:relative;overflow:hidden;}
.hero-glow{position:absolute;inset:0;pointer-events:none;opacity:0;}
.hero-glow.greece{background:radial-gradient(ellipse at top right,#2a6596 0%,transparent 65%);opacity:0.22;}
.hero-glow.egypt{background:radial-gradient(ellipse at top right,#c9a84c 0%,transparent 65%);opacity:0.18;}
.hero-glow.transit{background:radial-gradient(ellipse at top right,#555 0%,transparent 65%);opacity:0.13;}
.eyebrow{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.hero-title{font-family:'Playfair Display',serif;font-size:25px;font-weight:400;line-height:1.15;margin-bottom:3px;}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-sub{font-size:12px;color:var(--muted);margin-bottom:11px;}
.badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.badge.greece{background:var(--aegean-dim);border:1px solid rgba(42,101,150,0.4);color:#6db3e8;}
.badge.egypt{background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);}
.badge.transit{background:rgba(120,120,120,0.1);border:1px solid rgba(120,120,120,0.25);color:var(--muted);}
.badge.sm{font-size:10px;background:var(--surface);border:1px solid var(--border);color:var(--muted);}
.sec{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin:14px 16px 8px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.cards{padding:0 12px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 14px;margin-bottom:8px;}
.card.flight{border-color:rgba(108,183,225,0.22);}.card.hotel{border-color:rgba(201,168,76,0.22);}.card.airbnb{border-color:rgba(255,90,95,0.22);}.card.place{border-color:rgba(184,92,56,0.18);}.card.meal{border-color:rgba(76,175,125,0.18);}.card.car{border-color:rgba(180,180,180,0.18);}.card.tip{border-color:var(--border);background:var(--surface);}
.card.add-btn{border-style:dashed;background:transparent;cursor:pointer;text-align:center;color:var(--muted);}
.card.add-btn:active{background:var(--surface);}
.card-title{font-family:'Playfair Display',serif;font-size:15px;margin-bottom:2px;line-height:1.25;}
.card-sub{font-size:12px;color:var(--muted);line-height:1.5;}
.card-detail{font-size:12.5px;color:rgba(232,226,212,0.82);margin-top:6px;line-height:1.6;}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.bk-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.ref-lbl{font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
.ref-code{font-size:13px;font-weight:600;color:var(--gold);letter-spacing:0.04em;margin-left:5px;}
.map-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#6db3e8;text-decoration:none;padding:4px 9px;border-radius:8px;border:1px solid rgba(42,101,150,0.3);background:rgba(42,101,150,0.1);}
.map-btn:active{opacity:0.7;}
.ci-row{display:flex;gap:8px;margin-top:8px;}
.ci-box{flex:1;background:var(--bg3);border-radius:9px;padding:7px 10px;border:1px solid var(--border);}
.ci-lbl{font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
.ci-val{font-size:13px;font-weight:500;color:var(--text);}
.addr-row{display:flex;align-items:flex-start;gap:6px;margin-top:7px;}
.addr-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.addr-text{font-size:12px;color:var(--muted);line-height:1.45;flex:1;}
.f-route{display:flex;align-items:center;gap:8px;margin:8px 0 5px;}
.f-city{text-align:center;}
.f-code{font-family:'Playfair Display',serif;font-size:21px;color:var(--gold);line-height:1;}
.f-name{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:1px;}
.f-line{flex:1;display:flex;align-items:center;gap:3px;}
.f-line::before,.f-line::after{content:'';flex:1;height:1px;background:var(--border2);}
.f-plane{font-size:14px;color:var(--muted);}
.f-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.attach-strip{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.attach-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);font-size:11px;color:var(--muted);text-decoration:none;cursor:pointer;white-space:nowrap;}
.attach-chip.linked{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim);}
.attach-chip:active{opacity:0.7;}
.audio-player{display:flex;align-items:center;gap:9px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.play-btn{width:34px;height:34px;border-radius:50%;background:var(--terra);border:none;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(184,92,56,0.35);transition:transform 0.12s;}
.play-btn:active{transform:scale(0.88);}.play-btn.playing{background:#c07035;}
.prog-col{flex:1;min-width:0;}
.audio-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prog-track{height:3px;border-radius:2px;background:rgba(255,255,255,0.1);cursor:pointer;}
.prog-fill{height:100%;border-radius:2px;background:var(--gold);width:0%;transition:width 0.08s linear;}
.prog-times{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px;}
.notes-area{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:13.5px;line-height:1.65;resize:none;min-height:70px;}
.notes-area::placeholder{color:rgba(122,114,100,0.55);font-style:italic;}
.ov-hero{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.ov-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;}
.ov-title em{font-style:italic;color:var(--gold);}
.ov-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.stats{display:flex;gap:7px;padding:10px 14px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.stats::-webkit-scrollbar{display:none;}
.stat{display:flex;flex-direction:column;align-items:center;padding:8px 13px;border-radius:11px;background:var(--surface);border:1px solid var(--border);flex-shrink:0;}
.stat-n{font-family:'Playfair Display',serif;font-size:21px;color:var(--gold);line-height:1;}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;}
.ov-list{padding:8px 12px 0;}
.ov-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;border-left:3px solid transparent;transition:background 0.13s;}
.ov-item.greece{border-left-color:var(--aegean);}.ov-item.egypt{border-left-color:var(--gold);}.ov-item.transit{border-left-color:var(--muted);}
.ov-item:active{background:var(--bg3);}
.ov-day{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);width:26px;text-align:center;flex-shrink:0;}
.ov-info{flex:1;min-width:0;}
.ov-t{font-size:13.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ov-s{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ov-flag{font-size:19px;}
.pack-wrap{padding:16px 16px 4px;}
.pack-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;}
.pack-title em{font-style:italic;color:var(--gold);}
.pack-sec{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:12px 16px 6px;display:flex;align-items:center;gap:8px;}
.pack-sec::after{content:'';flex:1;height:1px;background:var(--border);}
.pack-row{display:flex;align-items:center;gap:11px;padding:10px 16px;cursor:pointer;border-radius:9px;margin:0 8px;transition:background 0.12s;}
.pack-row:active{background:var(--surface);}
.pack-check{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 0.15s;}
.pack-check.done{background:var(--gold);border-color:var(--gold);color:#0e1117;}
.pack-text{font-size:13.5px;flex:1;}
.pack-row.done .pack-text{color:var(--muted);text-decoration:line-through;}
.info-wrap{padding:16px 16px 4px;}
.info-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;}
.info-title em{font-style:italic;color:var(--gold);}
.info-block{margin:0 12px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 14px;}
.info-block-title{font-family:'Playfair Display',serif;font-size:14px;margin-bottom:6px;}
.info-block-body{font-size:12.5px;color:rgba(232,226,212,0.82);line-height:1.7;}
.info-block-body strong{color:var(--text);font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--border2);padding:14px 16px calc(var(--safe-b) + 26px);width:100%;max-width:430px;max-height:88vh;overflow-y:auto;animation:slideUp 0.22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px;}
.sheet-eyebrow{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.sheet-title{font-family:'Playfair Display',serif;font-size:21px;margin-bottom:16px;}
.slbl{font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 6px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,0.02);cursor:pointer;transition:all 0.14s;user-select:none;}
.tile:active{transform:scale(0.93);}.tile.sel{border-color:var(--gold);background:var(--gold-dim);}
.tile .ti{font-size:23px;line-height:1;}.tile .tl{font-size:11px;color:var(--muted);font-weight:500;}.tile.sel .tl{color:var(--gold);}
.link-box{display:flex;align-items:center;border:1px solid var(--border2);border-radius:11px;background:var(--bg3);overflow:hidden;margin-bottom:10px;}
.link-pfx{padding:12px;font-size:16px;flex-shrink:0;border-right:1px solid var(--border);}
.link-inp{flex:1;background:transparent;border:none;outline:none;padding:12px;font-family:'Outfit',sans-serif;font-size:13.5px;color:var(--text);min-width:0;}
.link-inp::placeholder{color:rgba(122,114,100,0.5);font-style:italic;}
.link-x{padding:12px 10px;color:var(--muted);cursor:pointer;font-size:16px;display:none;}
.link-x.show{display:block;}
.or-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.or-row::before,.or-row::after{content:'';flex:1;height:1px;background:var(--border);}
.or-row span{font-size:11px;color:var(--muted);}
.browse-btn{width:100%;padding:12px;border-radius:11px;border:1.5px dashed var(--border2);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.browse-btn:active{background:rgba(255,255,255,0.04);}
.linked-preview{display:none;align-items:center;gap:10px;padding:11px 13px;background:var(--bg3);border:1px solid var(--gold-border);border-radius:11px;margin-bottom:16px;}
.linked-preview.show{display:flex;}
.lp-icon{font-size:22px;flex-shrink:0;}.lp-info{flex:1;min-width:0;}
.lp-name{font-size:13px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp-path{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp-x{font-size:17px;color:var(--muted);cursor:pointer;padding:5px;flex-shrink:0;}
.lp-x:active{color:var(--red);}
.note-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;padding:11px 13px;font-family:'Outfit',sans-serif;font-size:13.5px;color:var(--text);outline:none;resize:none;min-height:54px;margin-bottom:14px;}
.note-inp:focus{border-color:var(--gold-border);}
.note-inp::placeholder{color:rgba(122,114,100,0.5);font-style:italic;}
.audio-hint{display:none;background:rgba(42,101,150,0.1);border:1px solid rgba(42,101,150,0.3);border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:12px;color:#6db3e8;line-height:1.55;}
.audio-hint.show{display:block;}
.sheet-actions{display:flex;gap:8px;}
.btn-cancel{padding:13px 17px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;}
.btn-save{flex:1;padding:13px;background:var(--gold);border:none;border-radius:13px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#0e1117;cursor:pointer;}
.btn-save:active{opacity:0.85;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,17,23,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:7px 0 calc(var(--safe-b) + 7px);z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;color:var(--muted);cursor:pointer;padding:3px 0;font-family:'Outfit',sans-serif;transition:color 0.15s;}
.ni.active{color:var(--gold);}
.ni-icon{font-size:20px;}.ni-lbl{font-size:10px;letter-spacing:0.04em;}
input[type="file"]{display:none!important;}

.fv-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;display:none;flex-direction:column;}
.fv-overlay.open{display:flex;}
.fv-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-t)+12px) 16px 12px;background:var(--bg2);border-bottom:1px solid var(--border);}
.fv-title{font-size:13px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:10px;}
.fv-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fv-body{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;}
.fv-body iframe{width:100%;flex:1;border:none;min-height:100%;}
.fv-body img{max-width:100%;height:auto;display:block;margin:auto;padding:8px;}
.fv-other{padding:40px 24px;text-align:center;color:var(--muted);margin:auto;}
.fv-other .fv-icon{font-size:52px;margin-bottom:14px;}
.fv-other p{font-size:13px;line-height:1.6;margin-bottom:20px;color:var(--muted);}
.fv-dl{display:inline-flex;align-items:center;gap:7px;padding:12px 22px;background:var(--gold);color:#0e1117;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;border:none;}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-title">Greece &amp; Egypt</div><div class="hdr-sub">May 2026 &middot; 17 days</div></div>
  <div class="hdr-actions">
    <div class="gps-pill" id="gpsPill" onclick="toggleGPS()"><div class="gps-dot"></div><span id="gpsLbl">GPS off</span></div>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
</div>
<div class="strip-wrap" id="stripWrap"><div class="strip" id="strip"></div></div>
<div class="scroll" id="mainScroll">
  <div class="view active" id="viewDay"></div>
  <div class="view" id="viewOverview"></div>
  <div class="view" id="viewPacking"></div>
  <div class="view" id="viewInfo"></div>

/* ═══════════ INDEXEDDB ═══════════ */
function openDB(){
  return new Promise(function(res,rej){
    var r=indexedDB.open('TripFiles',2);
    r.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains('audio'))db.createObjectStore('audio',{keyPath:'id'});
      if(!db.objectStoreNames.contains('files'))db.createObjectStore('files',{keyPath:'id'});
    };
    r.onsuccess=function(e){res(e.target.result);};
    r.onerror=rej;
  });
}
async function saveBlob(k,b){
  var db=await openDB();
  return new Promise(function(res,rej){var tx=db.transaction('audio','readwrite');tx.objectStore('audio').put({id:k,blob:b});tx.oncomplete=res;tx.onerror=rej;});
}
async function loadBlob(k){
  var db=await openDB();
  return new Promise(function(res){var tx=db.transaction('audio','readonly');var r=tx.objectStore('audio').get(k);r.onsuccess=function(e){res(e.target.result?e.target.result.blob:null);};r.onerror=function(){res(null);};});
}
async function saveFile(k,blob,name,mime){
  var db=await openDB();
  return new Promise(function(res,rej){var tx=db.transaction('files','readwrite');tx.objectStore('files').put({id:k,blob:blob,name:name,mime:mime||'application/octet-stream'});tx.oncomplete=res;tx.onerror=rej;});
}
async function loadFile(k){
  var db=await openDB();
  return new Promise(function(res){var tx=db.transaction('files','readonly');var r=tx.objectStore('files').get(k);r.onsuccess=function(e){res(e.target.result||null);};r.onerror=function(){res(null);};});
}

  if(!name)return'📎';
  if(/\.(mp3|m4a|wav|aac|ogg)$/i.test(name))return'🎧';
  if(/\.pdf$/i.test(name))return'📄';
  if(/\.(xlsx?|csv)$/i.test(name))return'📊';
  if(/\.(jpe?g|png|gif|heic|webp)$/i.test(name))return'🖼';
  return'🔗';
}

/* ═══════════ AUDIO ═══════════ */
async function handleAudio(evt,k){
  var f=evt.target.files[0];
  if(!f) return;
  var ab=await f.arrayBuffer();
  var blob=new Blob([ab],{type:f.type});
  await saveBlob(k,blob);
  S.setAudioMeta(k,{name:f.name,type:f.type});
  showPlayer(k,URL.createObjectURL(blob),f.name);
  markChipFile(k);
}
async function restoreAudio(k,fallback){
  var blob=await loadBlob(k);
  if(!blob) return;
  var meta=S.audioMeta(k)||{name:fallback||'Audio'};
  showPlayer(k,URL.createObjectURL(blob),meta.name);
  markChipFile(k);
}
function showPlayer(k,url,name){
  var a=document.getElementById('aud'+k);
  if(!a){a=document.createElement('audio');a.id='aud'+k;document.getElementById('audioPool').appendChild(a);}
  a.src=url;
  audioEls[k]=a;
  a.ontimeupdate=function(){updateProg(k);};
  a.onended=function(){
    var b=document.getElementById('pb'+k);
    if(b){b.textContent='▶';b.classList.remove('playing');}
  };
  a.onloadedmetadata=function(){
    var el=document.getElementById('dt'+k);
    if(el) el.textContent=fmtTime(a.duration);
  };
  var ap=document.getElementById('ap'+k); if(ap) ap.style.display='flex';
  var aus=document.getElementById('aus'+k); if(aus) aus.style.display='none';
  var lbl=document.getElementById('albl'+k); if(lbl) lbl.textContent='🎧 '+name;
}
function togglePlay(k){
  var a=audioEls[k]; if(!a) return;
  var btn=document.getElementById('pb'+k);
  if(a.paused){
    for(var j in audioEls){if(j!==k&&!audioEls[j].paused){audioEls[j].pause();var bb=document.getElementById('pb'+j);if(bb){bb.textContent='▶';bb.classList.remove('playing');}}}
    a.play();
    if(btn){btn.textContent='⏸';btn.classList.add('playing');}
  } else {
    a.pause();
    if(btn){btn.textContent='▶';btn.classList.remove('playing');}
  }
}
function updateProg(k){
  var a=audioEls[k]; if(!a||!a.duration) return;
  var pct=(a.currentTime/a.duration)*100;
  var pf=document.getElementById('pf'+k); if(pf) pf.style.width=pct+'%';
  var ct=document.getElementById('ct'+k); if(ct) ct.textContent=fmtTime(a.currentTime);
}
function seekAudio(evt,k){
  var a=audioEls[k]; var tr=document.getElementById('pt'+k);
  if(!a||!a.duration||!tr) return;
  var rect=tr.getBoundingClientRect();
  a.currentTime=Math.max(0,Math.min(1,(evt.clientX-rect.left)/rect.width))*a.duration;
}
function fmtTime(s){
  if(!s||isNaN(s)) return '0:00';
  return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');
}
function markChipFile(k){
  var n=parseInt(k.replace(/^d(\d+).*/,'$1'));
  var c=document.getElementById('chip'+n); if(c) c.classList.add('has-file');
}

/* ═══════════ FILE VIEWER ═══════════ */
async function openFileViewer(fkey,fname){
  var rec=await loadFile(fkey);
  if(!rec){alert('File not found. Please re-attach it.');return;}
  var url=URL.createObjectURL(rec.blob);
  var mime=rec.mime||'';
  var title=rec.name||fname||'File';
  document.getElementById('fvTitle').textContent=title;
  var body=document.getElementById('fvBody');
  body.innerHTML='';
  if(mime==='application/pdf'||title.toLowerCase().endsWith('.pdf')){
    var iframe=document.createElement('iframe');
    iframe.src=url;
    iframe.style.cssText='width:100%;flex:1;border:none;min-height:calc(100vh - 60px);';
    body.appendChild(iframe);
  } else if(mime.startsWith('image/')){
    var img=document.createElement('img');
    img.src=url;
    img.style.cssText='max-width:100%;height:auto;display:block;margin:auto;padding:12px;';
    body.appendChild(img);
  } else {
    var ext=(title.split('.').pop()||'').toUpperCase();
    var ico=fIcon(title);
    body.innerHTML='<div class="fv-other"><div class="fv-icon">'+ico+'</div><p><strong>'+title+'</strong><br>'+ext+' files open in their native app.<br>Tap below to download.</p><a class="fv-dl" href="'+url+'" download="'+title+'">⬇ Download &amp; Open</a></div>';
  }
  document.getElementById('fvOverlay').classList.add('open');
}
function closeViewer(){
  var b=document.getElementById('fvBody');
  var iframes=b.querySelectorAll('iframe');
  for(var i=0;i<iframes.length;i++){try{URL.revokeObjectURL(iframes[i].src);}catch(e){}}
  var imgs=b.querySelectorAll('img');
  for(var i=0;i<imgs.length;i++){try{URL.revokeObjectURL(imgs[i].src);}catch(e){}}
  b.innerHTML='';
  document.getElementById('fvOverlay').classList.remove('open');
}

/* ═══════════ GPS ═══════════ */
function toggleGPS(){if(gpsOn)stopGPS();else startGPS();}
function startGPS(){
  if(!navigator.geolocation){setPill('err','Not supported');return;}
  setPill('','Requesting…');
  gpsWid=navigator.geolocation.watchPosition(
    function(p){uLat=p.coords.latitude;uLng=p.coords.longitude;setPill('on','±'+Math.round(p.coords.accuracy)+'m');checkTriggers();},
    function(){setPill('err','GPS error');},
    {enableHighAccuracy:true,maximumAge:15000,timeout:30000}
  );
  gpsOn=true;
}
function stopGPS(){if(gpsWid!==null){navigator.geolocation.clearWatch(gpsWid);gpsWid=null;}gpsOn=false;uLat=uLng=null;setPill('','GPS off');}
function setPill(cls,txt){var p=document.getElementById('gpsPill');p.className='gps-pill'+(cls?' '+cls:'');document.getElementById('gpsLbl').textContent=txt;}
function haversine(a,b,c,dd){var R=6371000,dL=(c-a)*Math.PI/180,dN=(dd-b)*Math.PI/180;var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function checkTriggers(){
  if(uLat===null) return;
  var d=null; for(var i=0;i<DAYS.length;i++){if(DAYS[i].day===curDay){d=DAYS[i];break;}}
  if(!d||!d.places) return;
  for(var pi=0;pi<d.places.length;pi++){
    var p=d.places[pi]; if(!p.gps) continue;
    var dist=haversine(uLat,uLng,p.gps.lat,p.gps.lng);
    var k='d'+curDay+'p'+pi, now=Date.now();
    if(dist<=p.gps.r&&(!trigLog[k]||now-trigLog[k]>300000)){trigLog[k]=now;autoPlay(k,p.name);}
  }
}
function autoPlay(k,name){
  var a=audioEls[k]; if(!a||!a.src) return;
  a.currentTime=0; a.play().catch(function(){});
  var b=document.getElementById('pb'+k); if(b){b.textContent='⏸';b.classList.add('playing');}
  var sec=document.getElementById('ap'+k); if(sec) sec.scrollIntoView({behavior:'smooth',block:'center'});
  if(Notification.permission==='granted') new Notification('📍 Audio Guide',{body:'Now playing: '+name});
}

/* ═══════════ ADD ITEM SHEET ═══════════ */
function openSheet(day){
  modalDay=day;
  var d=null; for(var i=0;i<DAYS.length;i++){if(DAYS[i].day===day){d=DAYS[i];break;}}
  document.getElementById('sheetEyebrow').textContent='Day '+day+(d?' · '+d.date:'');
  selType='audio';
  var tiles=document.querySelectorAll('.tile');
  for(var i=0;i<tiles.length;i++) tiles[i].classList.toggle('sel',tiles[i].dataset.t==='audio');
  document.getElementById('audioHint').classList.add('show');
  clearLink(); clearLinked();
  pendingFile=null;
  document.getElementById('noteInp').value='';
  document.getElementById('overlay').classList.add('open');
}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeSheet();}
function closeSheet(){document.getElementById('overlay').classList.remove('open');}
function selTile(el){
  var tiles=document.querySelectorAll('.tile');
  for(var i=0;i<tiles.length;i++) tiles[i].classList.remove('sel');
  el.classList.add('sel'); selType=el.dataset.t;
  document.getElementById('audioHint').classList.toggle('show',selType==='audio');
}
function clearLink(){document.getElementById('linkInp').value='';document.getElementById('linkX').classList.remove('show');}
function onLinkType(){document.getElementById('linkX').classList.toggle('show',document.getElementById('linkInp').value.length>0);}
function clearLinked(){document.getElementById('linkedPreview').classList.remove('show');document.getElementById('linkArea').style.display='';pendingFile=null;}
function onFilePick(evt){
  var f=evt.target.files[0]; if(!f) return;
  pendingFile={name:f.name,icon:fIcon(f.name),blob:f,mime:f.type||'application/octet-stream'};
  document.getElementById('lpIcon').textContent=pendingFile.icon;
  document.getElementById('lpName').textContent=f.name;
  document.getElementById('lpPath').textContent='Stored offline — safe to delete original after saving';
  document.getElementById('linkedPreview').classList.add('show');
  document.getElementById('linkArea').style.display='none';
}
async function saveItem(){
  var note=document.getElementById('noteInp').value.trim();
  var linkVal=document.getElementById('linkInp').value.trim();
  var xi=S.extra(modalDay).length;
  var fkey='d'+modalDay+'x'+xi;
  var fileRef=linkVal||null;
  var storedKey=null;
  if(pendingFile&&pendingFile.blob){
    var ab=await pendingFile.blob.arrayBuffer();
    var blob=new Blob([ab],{type:pendingFile.mime||'application/octet-stream'});
    fileRef=pendingFile.name;
    if(selType==='audio'){
      await saveBlob(fkey,blob);
      S.setAudioMeta(fkey,{name:pendingFile.name,type:pendingFile.mime});
    } else {
      await saveFile(fkey,blob,pendingFile.name,pendingFile.mime);
    }
    storedKey=fkey;
  }
  S.addExtra(modalDay,{type:selType,name:selType,note:note,fileRef:fileRef,storedKey:storedKey});
  closeSheet();
  await renderDay(modalDay);
}

/* ═══════════ PACKING ═══════════ */
function buildPacking(){
  var v=document.getElementById('viewPacking');
  var p=S.pack();
  var h='<div class="pack-wrap"><div class="pack-title">Packing <em>List</em></div></div>';
  var secs=Object.keys(PACKING);
  for(var si=0;si<secs.length;si++){
    var sec=secs[si], items=PACKING[sec];
    h+='<div class="pack-sec">'+sec+'</div>';
    for(var ii=0;ii<items.length;ii++){
      var item=items[ii], key=sec+'|'+item, done=p[key]||false;
      var safeKey=key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      h+='<div class="pack-row'+(done?' done':'')+'" onclick="togglePackRow(this,\''+safeKey+'\')">';
      h+='<div class="pack-check'+(done?' done':'')+'">'+( done?'✓':'')+'</div>';
      h+='<span class="pack-text">'+item+'</span></div>';
    }
  }
  v.innerHTML=h;
}
function togglePackRow(row,key){
  var done=S.togglePack(key);
  row.classList.toggle('done',done);
  var c=row.querySelector('.pack-check');
  c.classList.toggle('done',done);
  c.textContent=done?'✓':'';
}

/* ═══════════ TAB NAV ═══════════ */
function switchTab(tab){
  curTab=tab;
  var tabs=['day','overview','packing','info'];
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i];
    var vEl=document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1));
    var nEl=document.getElementById('nav-'+t);
    if(vEl) vEl.classList.toggle('active',t===tab);
    if(nEl) nEl.classList.toggle('active',t===tab);
  }
  document.getElementById('stripWrap').style.display=tab==='day'?'':'none';
  document.getElementById('mainScroll').scrollTop=0;
}
function goToday(){
  var d=Math.floor((new Date()-new Date('2026-05-01'))/86400000)+1;
  selectDay(d>=1&&d<=17?d:1);
}
